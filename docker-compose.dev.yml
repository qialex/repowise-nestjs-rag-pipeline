services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: dev
    container_name: repowise-backend-dev
    working_dir: /workspace
    command: sh -c "pnpm install && pnpm run dev"
    volumes:
      - .:/workspace                 # full monorepo
      - /workspace/node_modules      # preserve root node_modules
      - /workspace/apps/backend/node_modules
      - /workspace/apps/frontend/node_modules
    env_file: ./apps/backend/.env
    environment:
      NODE_ENV: development
    ports:
      - '3001:3001'
      - '3000:3000'
      - '9229:9229'                  # Node debugger
    depends_on:
      - redis
    networks:
      - repowise-dev

  redis:
    image: redis:7-alpine
    container_name: repowise-redis-dev
    ports:
      - '6379:6379'
    networks:
      - repowise-dev

networks:
  repowise-dev:
    driver: bridge
