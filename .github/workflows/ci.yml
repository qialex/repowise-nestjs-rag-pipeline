name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/backend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run test

  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build --target prod -t repowise-backend ./apps/backend
      - name: Build frontend image
        run: docker build --target prod -t repowise-frontend ./apps/frontend
